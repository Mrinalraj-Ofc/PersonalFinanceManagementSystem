<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultSync Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>VaultSync</h2>
        <ul>
            <li class="active">Overview</li>
            <li>Transactions</li>
            <li>Bills & Loans</li>
            <li>Analysis</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="topbar">
            <input type="text" placeholder="Search transactions, bills...">
        </div>

        <div class="cards">
            <div class="card income">
                <h3>Avg Income</h3>
                <p>Rs 8,557</p>
            </div>

            <div class="card expense">
                <h3>Avg Expense</h3>
                <p>Rs 3,334</p>
            </div>

            <div class="card savings">
                <h3>Avg Savings</h3>
                <p>Rs 1,429</p>
            </div>
        </div>

        <div class="chart">
            <h3>Cash Flow Statistics</h3>
            <canvas id="chart"></canvas>
        </div>

    </div>

    <!-- Right Panel -->
    <div class="right-panel">
        <h3>AI Analyst</h3>

        <div class="insight">High Utility Expenditure Expected</div>
        <div class="insight">Savings Goal on Track</div>
        <div class="insight">Loan Consolidation Opportunity</div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
