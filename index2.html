<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bills & Loans</title>

<link rel="stylesheet" href="styles.css">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="search-box">
    <i data-lucide="search"></i>
    <input type="text" placeholder="Search transactions, bills..." />
  </div>
  <div class="icons">
    <i data-lucide="bell"></i>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Bills & Loans</h1>
  <p class="subtitle">Manage your active bills, due dates, and loan tracking.</p>

  <div class="grid">

    <!-- LEFT: BILLS -->
    <div class="card">

      <div class="card-header">
        <div class="title">
          <i data-lucide="calendar"></i>
          <h3>Upcoming Bills</h3>
        </div>

        <button class="manage-btn">Manage All</button>
      </div>

      <div id="billsList"></div>
    </div>

    <!-- RIGHT: LOANS -->
    <div class="card">

      <div class="card-header">
        <div class="title">
          <i data-lucide="landmark"></i>
          <h3>Active Loans</h3>
        </div>
        <i data-lucide="chevron-right"></i>
      </div>

      <div id="loansList"></div>
    </div>

  </div>
</div>

<script src="scripts.js"></script>

<script>
  lucide.createIcons();
</script>

</body>
</html>
