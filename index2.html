<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultSync</title>

<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/lucide@latest"></script>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2 class="logo">VaultSync</h2>
  <ul>
    <li class="active">Dashboard</li>
    <li>Transactions</li>
    <li>Bills</li>
    <li>Loans</li>
    <li>Reports</li>
    <li>Settings</li>
  </ul>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="search-box">
    <i data-lucide="search"></i>
    <input type="text" id="searchInput" placeholder="Search bills..." oninput="searchBills()">
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <h1>Bills & Loans</h1>

  <div class="grid">

    <!-- BILLS -->
    <div class="card">
      <div class="card-header">
        <h3>Upcoming Bills</h3>

        <div>
          <button class="add-btn" onclick="openAddModal()">+ Add</button>
          <button class="delete-btn" onclick="toggleDeleteMode()">Delete</button>
        </div>
      </div>

      <div id="billsList"></div>

      <!-- DELETE ACTION -->
      <button id="deleteSelectedBtn" class="confirm-delete hidden" onclick="deleteSelected()">
        Delete Selected
      </button>
    </div>

    <!-- LOANS -->
    <div class="card">
      <h3>Active Loans</h3>
      <p style="color:gray;">(UI placeholder)</p>
    </div>

  </div>
</div>

<!-- ADD MODAL -->
<div id="addModal" class="modal hidden">
  <div class="modal-box">
    <h3>Add Bill</h3>

    <input id="billName" placeholder="Bill name">
    <input id="billAmount" type="number" placeholder="Amount">
    <input id="billDate" type="date">

    <div class="modal-actions">
      <button onclick="addBill()">Add</button>
      <button onclick="closeAddModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- PAY MODAL -->
<div id="payModal" class="modal hidden">
  <div class="modal-box">
    <h3>Make Payment</h3>

    <p id="rangeInfo"></p>
    <input id="payAmount" type="number" placeholder="Enter amount">

    <div class="modal-actions">
      <button onclick="confirmPayment()">Confirm</button>
      <button onclick="closePayModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="scripts.js"></script>
<script>lucide.createIcons();</script>

</body>
</html>
